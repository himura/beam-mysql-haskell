repos:
  - repo: local
    hooks:
      - id: fourmolu
        name: fourmolu
        entry: fourmolu --mode=inplace
        language: system
        files: '\.(hs|hs-boot)$'
      - id: hpack
        name: hpack
        entry: hpack
        language: system
        always_run: true
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
